
<style>
  #heart-canvas { display: block; margin: 0 auto; }
  #msg { text-align: center; font-size: 22px; font-weight: 500; color: #e0294a; opacity: 0; transition: opacity 1.5s; margin-top: 12px; font-family: Georgia, serif; letter-spacing: 1px; }
  #btn-wrap { text-align: center; margin-top: 16px; }
  button { cursor: pointer; padding: 8px 28px; border-radius: 20px; border: 1.5px solid #e0294a; background: transparent; color: #e0294a; font-size: 15px; transition: background 0.2s, color 0.2s; }
  button:hover { background: #e0294a; color: #fff; }
</style>
<canvas id="heart-canvas" width="520" height="460"></canvas>
<div id="msg">I love you ❤️</div>
<div id="btn-wrap"><button id="replay-btn">Draw again</button></div>
<script>
(function() {
  const canvas = document.getElementById('heart-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2 + 20;

  function heartX(t) {
    return 16 * Math.pow(Math.sin(t), 3);
  }
  function heartY(t) {
    return 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
  }

  const SCALE = 15;
  const STEPS = 360;
  const points = [];
  for (let i = 0; i <= STEPS; i++) {
    const t = (i / STEPS) * 2 * Math.PI;
    points.push({
      x: cx + heartX(t) * SCALE,
      y: cy - heartY(t) * SCALE
    });
  }

  let animId = null;
  let step = 0;
  const DELAY = 5;
  let frameCount = 0;

  function lerp(a, b, t) { return a + (b - a) * t; }

  function getColor(progress) {
    const r1 = 230, g1 = 41, b1 = 74;
    const r2 = 255, g2 = 100, b2 = 130;
    const r = Math.round(lerp(r1, r2, progress));
    const g = Math.round(lerp(g1, g2, progress));
    const b = Math.round(lerp(b1, b2, progress));
    return `rgb(${r},${g},${b})`;
  }

  function drawBackground() {
    ctx.clearRect(0, 0, W, H);
  }

  function drawTrail() {
    if (step < 2) return;
    const trailLen = Math.min(step, 18);
    for (let i = Math.max(0, step - trailLen); i < step - 1; i++) {
      const progress = i / STEPS;
      ctx.beginPath();
      ctx.moveTo(points[i].x, points[i].y);
      ctx.lineTo(points[i+1].x, points[i+1].y);
      ctx.strokeStyle = getColor(progress);
      ctx.lineWidth = 3.5;
      ctx.globalAlpha = 0.18 + 0.7 * ((i - (step - trailLen)) / trailLen);
      ctx.lineCap = 'round';
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawCompleted() {
    for (let i = 0; i < step - 1; i++) {
      const progress = i / STEPS;
      ctx.beginPath();
      ctx.moveTo(points[i].x, points[i].y);
      ctx.lineTo(points[i+1].x, points[i+1].y);
      ctx.strokeStyle = getColor(progress);
      ctx.lineWidth = 3.5;
      ctx.globalAlpha = 1;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawDot() {
    if (step >= points.length) return;
    const p = points[step];
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.9;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffb3c6';
    ctx.fill();
  }

  function animate() {
    frameCount++;
    if (frameCount % 2 !== 0) {
      animId = requestAnimationFrame(animate);
      return;
    }
    drawBackground();
    drawCompleted();
    drawTrail();
    drawDot();
    step++;
    if (step < points.length) {
      animId = requestAnimationFrame(animate);
    } else {
      finalize();
    }
  }

  function finalize() {
    drawBackground();
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.closePath();
    const grad = ctx.createRadialGradient(cx, cy - 40, 10, cx, cy, 180);
    grad.addColorStop(0, 'rgba(255,120,150,0.38)');
    grad.addColorStop(1, 'rgba(220,30,60,0.10)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    for (let i = 0; i < points.length - 1; i++) {
      const progress = i / STEPS;
      ctx.beginPath();
      ctx.moveTo(points[i].x, points[i].y);
      ctx.lineTo(points[i+1].x, points[i+1].y);
      ctx.strokeStyle = getColor(progress);
      ctx.lineWidth = 3.5;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    setTimeout(() => {
      document.getElementById('msg').style.opacity = '1';
    }, 200);
  }

  function startAnimation(customMsg) {
    if (animId) cancelAnimationFrame(animId);
    step = 0;
    frameCount = 0;
    document.getElementById('msg').style.opacity = '0';
    drawBackground();
    animId = requestAnimationFrame(animate);
  }

  document.getElementById('replay-btn').addEventListener('click', startAnimation);

  startAnimation();
})();
</script>
